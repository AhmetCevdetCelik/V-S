name: Machine Report
description: Share VIS Doctor / VIS Compare output from one machine
title: "Machine report: <CPU model or machine type>"
labels:
  - machine-report
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing VIS. Please remove hostnames, usernames, private paths,
        serial numbers, customer names, or any other identifier you do not want public.

  - type: input
    id: cpu_model
    attributes:
      label: CPU model
      description: Example: Intel Core i7-12700H, AMD Ryzen 7950X, Xeon Gold, etc.
      placeholder: "CPU model"
    validations:
      required: true

  - type: dropdown
    id: machine_type
    attributes:
      label: Machine type
      options:
        - laptop
        - desktop
        - workstation
        - server
        - companion computer
        - virtual machine
        - other
    validations:
      required: true

  - type: input
    id: distro_kernel
    attributes:
      label: Distro and kernel
      placeholder: "Ubuntu 24.04, Linux 6.x"
    validations:
      required: true

  - type: dropdown
    id: power_state
    attributes:
      label: Power state
      options:
        - AC power
        - battery
        - server power
        - unknown
    validations:
      required: true

  - type: textarea
    id: test_conditions
    attributes:
      label: Test conditions
      description: Was the machine idle, under load, charging, hot, running fans, running a workload, etc.?
      placeholder: "Idle desktop, AC power, browser open, no intentional stress."
    validations:
      required: true

  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Paste the exact VIS commands you ran.
      render: bash
      placeholder: |
        cd vis-jitter
        make
        make test
        sudo modprobe msr
        sudo ./vis-doctor --scan --duration 30 --threshold 100 --output doctor.json --llm doctor.md
        ./vis-run --policy doctor.json --dry-run --output run-attestation.json -- /bin/true
        ./vis-compare --policy doctor.json --output compare.json --llm compare.md -- /bin/true
    validations:
      required: true

  - type: textarea
    id: doctor_md
    attributes:
      label: doctor.md
      description: Paste the Markdown output generated by VIS Doctor.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: compare_md
    attributes:
      label: compare.md
      description: Paste the Markdown output generated by VIS Compare, if available.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: extra_reports
    attributes:
      label: Optional JSON or notes
      description: Paste optional JSON snippets, run-attestation output, observations, errors, or links.
      render: json
    validations:
      required: false
